interface nve1
 description ** NVE Interface for VXLAN **
 no ip address
 source-interface Loopback0
 host-reachability protocol bgp
 member vni 50901 vrf red
 member vni 50902 vrf blue
 member vni 50903 vrf green
 member vni 10101 mcast-group 239.190.100.101
 member vni 10201 mcast-group 239.190.100.201
 member vni 10401 mcast-group 239.190.100.41
 member vni 10501 mcast-group 239.190.100.51
!
router isis
 net 49.0000.6841.d46c.a858.00
 is-type level-2-only
 domain-password CISCO
 metric-style wide
 log-adjacency-changes
 nsf ietf
 bfd all-interfaces
!
router bgp 65001
 template peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-session UNDERLAY-SPINE-EVPN-PEER-SESSION-POLICY
  remote-as 65001
  description SPINE-EVPN-PEER
  log-neighbor-changes
  update-source Loopback0
  fall-over route-map NODE-LOOPBACKS
 exit-peer-session
 !
 bgp router-id interface Loopback0
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 204.1.1.4 inherit peer-session UNDERLAY-SPINE-EVPN-PEER-SESSION-POLICY
 !
 address-family ipv4
  maximum-paths ibgp 2
 exit-address-family
 !
 address-family ipv4 mvpn
  bgp nexthop trigger delay 0
  neighbor 204.1.1.4 activate
  neighbor 204.1.1.4 send-community extended
  neighbor 204.1.1.4 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
 exit-address-family
 !
 address-family l2vpn evpn
  bgp additional-paths receive
  bgp nexthop trigger delay 0
  neighbor 204.1.1.4 activate
  neighbor 204.1.1.4 send-community extended
  neighbor 204.1.1.4 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
 exit-address-family
 !
 address-family ipv4 vrf blue
  advertise l2vpn evpn
  import path selection all
  redistribute connected
  maximum-paths ibgp 2
 exit-address-family
 !
 address-family ipv4 vrf green
  advertise l2vpn evpn
  import path selection all
  redistribute connected
  maximum-paths ibgp 2
 exit-address-family
 !
 address-family ipv4 vrf red
  advertise l2vpn evpn
  import path selection all
  redistribute connected
  maximum-paths ibgp 2
 exit-address-family
!
