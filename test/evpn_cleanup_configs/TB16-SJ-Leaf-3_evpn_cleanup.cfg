!
! BGP EVPN Cleanup Configuration for TB16-SJ-Leaf-3
! Generated: 2026-02-09 13:41:02
!
! This configuration removes BGP EVPN/VXLAN components while preserving:
!   - Basic device configuration
!   - ISIS routing protocol
!   - OSPF routing protocol
!   - Physical interfaces
!   - Management VRF
!
! IMPORTANT: Review this configuration before applying!
!

! ========================================
! Step 1: Remove BGP EVPN Address-Families
! ========================================
!
router bgp 65001
 no address-family l2vpn evpn
 no address-family ipv4 mvpn
 no address-family ipv4 vrf blue
 no address-family ipv4 vrf green
 no address-family ipv4 vrf red
 exit
!
! ========================================
! Step 2: Remove NVE Interface VNI Members
! ========================================
!
interface nve1
 no member vni 50901 vrf red
 no member vni 50902 vrf blue
 no member vni 50903 vrf green
 no member vni 10101 mcast-group 239.190.100.101
 no member vni 10201 mcast-group 239.190.100.201
 no member vni 10401 mcast-group 239.190.100.41
 no member vni 10501 mcast-group 239.190.100.51
 exit
!

! ========================================
! Step 3: Remove NVE Interface
! ========================================
!
no interface nve1
!

! ========================================
! Step 4: Remove EVPN Instance from VLANs
! ========================================
!
vlan configuration 101
 no member evpn-instance 101 vni 10101
 exit
vlan configuration 201
 no member evpn-instance 201 vni 10201
 exit
vlan configuration 401
 no member evpn-instance 401 vni 10401
 exit
vlan configuration 501
 no member evpn-instance 501 vni 10501
 exit
!

! ========================================
! Step 5: Remove L2VPN EVPN Instances
! ========================================
!
no l2vpn evpn instance 101 vlan-based
no l2vpn evpn instance 201 vlan-based
no l2vpn evpn instance 401 vlan-based
no l2vpn evpn instance 501 vlan-based
!

! ========================================
! Step 6: Remove SVI Interfaces
! ========================================
!
no interface Vlan101
no interface Vlan201
no interface Vlan401
no interface Vlan501
no interface Vlan901
no interface Vlan902
no interface Vlan903
!

! ========================================
! Step 7: Remove VLAN VNI Configurations
! ========================================
!
vlan configuration 901
 no member vni 50901
 exit
vlan configuration 902
 no member vni 50902
 exit
vlan configuration 903
 no member vni 50903
 exit
!

! ========================================
! Step 6: Remove EVPN VLANs
! ========================================
!
no vlan 101,201,401,501,901,902,903
!

! ========================================
! Step 7: Remove VRF Definitions
! ========================================
!
no vrf definition blue
no vrf definition green
no vrf definition red
!

! ========================================
! Step 9: Remove VRF Multicast Routing
! ========================================
!
no ip multicast-routing vrf blue
no ip multicast-routing vrf green
no ip multicast-routing vrf red
!

! ========================================
! Step 10: Remove BGP Completely (Optional)
! ========================================
!
no router bgp 65001
!

! ========================================
! Step 11: Save Configuration
! ========================================
!
end
write memory
!