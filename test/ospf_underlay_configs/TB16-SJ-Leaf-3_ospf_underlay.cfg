!
! OSPF Underlay Configuration for TB16-SJ-Leaf-3
! Generated: 2026-02-09 18:19:38
!
! This configuration enables OSPF routing on underlay interfaces
! - OSPF Process ID: 1
! - OSPF Area: 0
! - Preserves existing IP addresses
!

! ========================================
! OSPF Router Configuration
! ========================================
!
router ospf 1
 router-id 204.1.1.22
 network 204.1.1.22 0.0.0.0 area 0
 network 204.1.1.21 0.0.0.1 area 0
!

! ========================================
! Interface OSPF Configuration
! ========================================
!
interface Loopback0
 ip ospf 1 area 0
 exit
!
interface GigabitEthernet1/0/6
 ip ospf 1 area 0
 ip ospf network point-to-point
 exit
!
! ========================================
! Save Configuration
! ========================================
!
end
write memory
!