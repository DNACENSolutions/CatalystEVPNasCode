  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: true
      template_description: "BGP EVPN control plane configuration for border peering - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9500 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9300 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9400 Series Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: "5. FABRIC-EVPN"
      project_name: EVPN-DMZ
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% include "EVPN-DMZ/DEFN-VRF" %}
        {% include "EVPN-DMZ/DEFN-ROLES" %}
        {% include "EVPN-DMZ/DEFN-LOOPBACKS" %}
        {% include "EVPN-DMZ/DEFN-OVERLAY" %}
        {% include "EVPN-DMZ/DEFN-IPSEC" %}
        
        {# Resolve the VRF objects upfront #}
        {% set vrf_objs = [] %}
        {% for input_vrf in vrf_list %}
          {% set _vrf = (DEFN_VRF | selectattr("name", "equalto", input_vrf) | list | first) %}
          {% if _vrf %}{% do vrf_objs.append(_vrf | first) %}{% endif %}
        {% endfor %}
        
        router bgp {{FABRIC_BGP_ASN}}
        bgp router-id {{DEFN_LOOP_UNDERLAY[__device.hostname]}}
        bgp log-neighbor-changes
        no bgp default ipv4-unicast
        !
        {% if __device.hostname in DEFN_NODE_ROLES['BORDER']  %}
        {% set tun_list = DEFN_IPSEC[__device.hostname] %}
        {% for tun in tun_list %}
        neighbor {{tun['peer_ip']}} remote-as {{tun['peer_bgp_asn']}}
        neighbor {{tun['peer_ip']}} update-source Tunnel{{(DEFN_LOOP_IPSEC[__device.hostname]).split('\\.')[3] | int + loop.index0}}
        {% endfor %}
        !
        address-family l2vpn evpn
        {% for tun in tun_list %}
        neighbor {{tun['peer_ip']}} activate
        neighbor {{tun['peer_ip']}} send-community both
        {% endfor %}
        exit-address-family
        !
        {% for vrf in vrf_objs %}
        address-family ipv4 vrf {{vrf.name}}
        advertise l2vpn evpn
        redistribute connected
        {% for tun in tun_list %}
        neighbor {{tun['peer_ip']}} remote-as {{tun['peer_bgp_asn']}}
        neighbor {{tun['peer_ip']}} activate
        {% endfor %}
        exit-address-family
        !
        {% endfor %}
        {% endif %}
        {% endraw %}
      template_params:
        - parameter_name: vrf_list
          data_type: STRING
          default_value: null
          description: "List of VRF names to configure"
          required: true
          param_array: true
          selection:
            selection_type: MULTI_SELECT
            selection_values:
              "901": "red"
              "902": "blue"
              "903": "green"
              "1000": "shared"
        - parameter_name: __device
          data_type: STRING
          default_value: null
          description: "Device object"
          required: true
          param_array: false
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: true
      template_description: "VXLAN overlay network services - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9500 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9300 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9400 Series Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: "6. FABRIC-OVERLAY"
      project_name: EVPN-DMZ
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% include "EVPN-DMZ/DEFN-VRF" %}
        {% include "EVPN-DMZ/DEFN-ROLES" %}
        {% include "EVPN-DMZ/DEFN-OVERLAY" %}
        {% include "EVPN-DMZ/DEFN-VNIOFFSETS" %}
        
        {% if FABRIC_BGP_ASN is not none and vrf_list is not none and __device.hostname is not none %}
        
        {# === ROUTER BGP SECTION === #}
        router bgp {{FABRIC_BGP_ASN}}
        {% for vrf in vrf_list %}
          {% for overlay in DEFN_OVERLAY %}
            {% if overlay.vrf == vrf %}
            address-family ipv4 vrf {{vrf}}
            advertise l2vpn evpn
            import path selection all
            redistribute connected
            maximum-paths ibgp {{ DEFN_NODE_ROLES['SPINE'] | length }}
            exit-address-family
            !
            {% endif %}
          {% endfor %}
        {% endfor %}
        
        {# === L2VPN EVPN INSTANCE SECTION === #}
        {% for vrf in vrf_list %}
          {% for overlay in DEFN_OVERLAY %}
          {% if overlay.vrf == vrf %}
            {% if __device.hostname in DEFN_NODE_ROLES['BORDER'] or __device.hostname in DEFN_NODE_ROLES['SPINE']%}
            {# SKIP SPINE AND BORDER L2 DEFN #}
            {% else %}
            {% for vlan, params in overlay.vlans.items() %}
            {% set l2evpn_id = vlan %}
            l2vpn evpn instance {{l2evpn_id}} vlan-based
            encapsulation vxlan
            replication-type static
            !
            {% endfor %}
            {% endif %}
          {% endif %}
          {% endfor %}
        {% endfor %}
        
        {# === VLAN SECTION === #}
        ! @start-ignore-compliance
        {% for vrf in vrf_list %}
          {% for overlay in DEFN_OVERLAY %}
          {% if overlay.vrf == vrf %}
          {% for vlan, params in overlay.vlans.items() %}
          vlan {{vlan}}
          name {{params.name}}
          !
          {% endfor %}
          {% endif %}
          {% endfor %}
        {% endfor %}
        ! @end-ignore-compliance
        
        {# === VLAN CONFIGURATION SECTION === #}
        {% for vrf in vrf_list %}
          {% for overlay in DEFN_OVERLAY %}
          {% if overlay.vrf == vrf %}
            {% if __device.hostname in DEFN_NODE_ROLES['BORDER'] or __device.hostname in DEFN_NODE_ROLES['SPINE']%}
            {# SKIP SPINE AND BORDER L2 DEFN #}
            {% else %}
            {% for vlan, params in overlay.vlans.items() %}
            vlan configuration {{vlan}}
            member evpn-instance {{vlan}} vni {{L2VNIOFFSET + vlan}}
            !
            {% endfor %}
            {% endif %}
          {% endif %}
          {% endfor %}
        {% endfor %}
        
        {# === INTERFACE VLAN SECTION === #}
        {% for vrf in vrf_list %}
          {% for overlay in DEFN_OVERLAY %}
          {% if overlay.vrf == vrf %}
          {% for vlan, params in overlay.vlans.items() %}
          interface Vlan{{vlan}}
          description {{params.name}}
          vrf forwarding {{vrf}}
          ip address {{params.ipaddr}}
          no ip redirects
          ip pim sparse-mode
          no autostate
          !
          {% endfor %}
          {% endif %}
          {% endfor %}
        {% endfor %}
        {% endif %}
        {% endraw %}
      template_params:
        - parameter_name: vrf_list
          data_type: STRING
          default_value: null
          description: "List of VRF names to configure"
          required: false
          param_array: true
          selection:
            selection_type: MULTI_SELECT
            selection_values:
              "901": "red"
              "902": "blue"
              "903": "green"
        - parameter_name: __device
          data_type: STRING
          default_value: null
          description: "Device object"
          required: true
          param_array: false
      version: "1.0"

