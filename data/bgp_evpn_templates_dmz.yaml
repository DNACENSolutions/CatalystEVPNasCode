# Select Catalyst Center version
catalyst_center_version: 2.3.7.9

# BGP EVPN Project Templates Configuration for DMZ
# Site: DMZ Border Gateway
# Based on templates from CatC_EVPN_Project-DMZ.json
# 
# This file contains all the BGP EVPN VXLAN Campus Fabric templates for DMZ:
# 
# Definition Templates (DEFN-*):
#   - DEFN-MULTICAST: Multicast definitions for EVPN fabric
#   - DEFN-VRF: VRF definitions for multi-tenancy (red, blue, green, shared)
#   - DEFN-ROLES: Device role definitions (DMZ border node)
#   - DEFN-LOOPBACKS: Loopback interface definitions for underlay/overlay
#   - DEFN-VNIOFFSETS: VNI offset definitions for L2 and L3 VNIs
#   - DEFN-OVERLAY: Overlay network definitions with VLANs and SVIs
#   - DEFN-L3OUT: Layer 3 external connectivity definitions
#   - DEFN-IPSEC: IPSec/GRE tunnel definitions for multi-cluster
#
# Fabric Templates (FABRIC-*):
#   - 1. FABRIC-VRF: VRF configuration for multi-tenancy with shared VRF support
#   - 2. FABRIC-LOOPBACKS: Loopback interface configuration
#   - 2.5 FABRIC-IPSEC: IPSec/GRE tunnel configuration for border connectivity
#   - 3. FABRIC-NVE: Network Virtualization Edge (NVE) interface configuration
#   - 4. FABRIC-MCAST: Multicast configuration for BUM traffic
#   - 5. FABRIC-EVPN: BGP EVPN control plane configuration for border peering
#   - 6. FABRIC-OVERLAY: VXLAN overlay network services
#
# Composite Template:
#   - 0. BGP-EVPN-DMZ: Complete BGP EVPN DMZ fabric configuration (combines all templates)
#
# Usage: Deploy these templates to Catalyst Center using the device_templates role

state: merged
bgp_evpn_project: BGP_EVPN_SITE_DMZ
template_details:
  # ============================================================================
  # DEFINITION TEMPLATES
  # ============================================================================
  
  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: false
      template_description: "Multicast definitions for EVPN DMZ fabric"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: DEFN-MULTICAST
      project_name: "{{bgp_evpn_project}}"
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% set FABRIC_RP_ADDR  = '172.16.255.254' %}
        {% set FABRIC_RP_SCOPES = ['239.190.0.0 0.0.255.255'] %}
        
        {% set ENTERPRISE_RP_ADDR  = '172.17.254.100' %}
        {% set ENTERPRISE_RP_SCOPES = ['238.190.0.0 0.0.255.255'] %}
        {% endraw %}
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: false
      template_description: "VRF definitions for multi-tenancy with shared VRF - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: DEFN-VRF
      project_name: "{{bgp_evpn_project}}"
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {# NAMING CONVENTION#}
        {#MDT DEFAULT: 239.190.1XX.1#}
        {#MDT DATA:    239.190. XX.1#}
        {% set DEFN_VRF = [
          {'id':'901','name':'red', 'mdt_default':'239.190.0.1', 'mdt_data':'239.190.1.0'},
          {'id':'902','name':'blue', 'mdt_default':'239.190.0.2', 'mdt_data':'239.190.2.0'},
          {'id':'903','name':'green', 'mdt_default':'239.190.0.3', 'mdt_data':'239.190.3.0'},
          {'id':'1000','name':'shared', 'mdt_default':'239.190.0.100', 'mdt_data':'239.190.100.0'}
          ]
        %}
        {% endraw %}
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: false
      template_description: "Device role definitions - DMZ Border Node"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9500 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9300 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9400 Series Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: DEFN-ROLES
      project_name: "{{bgp_evpn_project}}"
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% set DEFN_NODE_ROLES =
          {
          'SPINE':  ['dmz01.dcloud.cisco.com'],
          'RR':     ['dmz01.dcloud.cisco.com'],
          'CLIENT': ['dmz01.dcloud.cisco.com'],
          'BORDER': ['dmz01.dcloud.cisco.com']
          }
        %}
        {% endraw %}
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: false
      template_description: "Loopback interface definitions - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9500 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9300 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9400 Series Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: DEFN-LOOPBACKS
      project_name: "{{bgp_evpn_project}}"
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% set DEFN_LOOP_UNDERLAY =
            {
              'dmz01.dcloud.cisco.com':   '172.18.200.1'
            }
        %}
        
        {% set DEFN_LOOP_IPSEC =
            {
              'border01.dcloud.cisco.com':  '172.16.255.60',
              'border02.dcloud.cisco.com':  '172.16.255.70',
              'dmz01.dcloud.cisco.com':     '172.16.255.201'
            }
        %}
        
        {% set DEFN_LOOP_MCLUSTER =
            {
              'border01.dcloud.cisco.com':  '172.16.255.66',
              'border02.dcloud.cisco.com':  '172.16.255.70',
              'dmz01.dcloud.cisco.com':     '172.16.255.210'
            }
        %}
        
        {% set DEFN_LOOP_OVERLAY =
            {
              'red':                                    '10.1.91.',
              'blue':                                   '10.1.92.',
              'green':                                  '10.1.93.'
            }
        %}
        
        {% set DEFN_LOOP_NAME =
            {
                'UNDERLAY': 'Loopback2',
                'ANYCAST':  'Loopback2',
                'IPSEC':    'Loopback1',
                'MCLUSTER': 'Loopback2'
            }
        %}
        {% endraw %}
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: false
      template_description: "VNI offset definitions for L2 and L3 VNIs - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: DEFN-VNIOFFSETS
      project_name: "{{bgp_evpn_project}}"
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {# NAMING CONVENTIONS   #}
        {# L3VNI {{L3VNIOFFSET}}{{ VRF ID }} #}
        {# L3VNI 50XXX #}
        {# L2VNI {{L2VNIOFFSET}}+{{ VLAN ID }} #}
        {# L2VNI 10XXX #}
        
        {% set L2VNIOFFSET = 10000 %}
        {% set L3VNIOFFSET = 50 %}
        {% endraw %}
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: false
      template_description: "Overlay network definitions - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9500 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9300 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9400 Series Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: DEFN-OVERLAY
      project_name: EVPN-DMZ
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% set FABRIC_BGP_ASN = '65003' %}
        {% set FABRIC_UNDERLAY = {'proto':'ospf', 'instance_id':'1', 'area':'0'} %}
        {% set FABRIC_IPSEC_UNDERLAY = {'proto':'ospf', 'instance_id':'100', 'area':'0'} %}
        
        {% set DEFN_OVERLAY = [
        ] %}
        {% endraw %}
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: false
      template_description: "Layer 3 external connectivity definitions - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: DEFN-L3OUT
      project_name: EVPN-DMZ
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% set DEFN_L3OUT = [
          {
            'vrf': 'red',
            'node': 'spine01.dcloud.cisco.com',
            'neighbour_asn': '65002',
            'interfaces': {
              'GigabitEthernet1/0/7.2': {'name': 'uplink1', 'vlan': '2', 'ipaddr': '10.255.255.1 255.255.255.252', 'neighbour': '10.255.255.2'},
              'GigabitEthernet1/0/8.2': {'name': 'uplink2', 'vlan': '2', 'ipaddr': '10.255.255.5 255.255.255.252', 'neighbour': '10.255.255.6'}
            }
          },
          {
            'vrf': 'red',
            'node': 'spine02.dcloud.cisco.com',
            'neighbour_asn': '65002',
            'interfaces': {
              'GigabitEthernet1/0/7.2': {'name': 'uplink1', 'vlan': '2', 'ipaddr': '10.255.255.13 255.255.255.252', 'neighbour': '10.255.255.14'},
              'GigabitEthernet1/0/8.2': {'name': 'uplink2', 'vlan': '2', 'ipaddr': '10.255.255.9 255.255.255.252', 'neighbour': '10.255.255.10'}
            }
          }
        ] %}
        
        {% set DEFN_L3OUT_AGGREGATES = ["10.1.11.0 255.255.255.0",
                                        "10.2.22.0 255.255.255.0"]
        %}
        {% endraw %}
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: false
      template_description: "IPSec/GRE tunnel definitions for multi-cluster - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: DEFN-IPSEC
      project_name: EVPN-DMZ
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% set DEFN_IPSEC =
          {
            'dmz01.dcloud.cisco.com': [
            {
              'tun_ip'      :   '10.100.100.1 255.255.255.252',
              'peer_ip'     :   '10.100.100.2',
              'tun_dst'     :   '172.16.255.60',
              'tun_mode'    :   'gre ip',
              'peer_bgp_asn':   '65001'
            },
            {
              'tun_ip'      :   '10.100.101.1 255.255.255.252',
              'peer_ip'     :   '10.100.101.2',
              'tun_dst'     :   '172.16.255.70',
              'tun_mode'    :   'gre ip',
              'peer_bgp_asn':   '65001'
            }],
            'border01.dcloud.cisco.com': [
            {
              'tun_ip'      :   '10.100.100.2 255.255.255.252',
              'peer_ip'     :   '10.100.100.1',
              'tun_dst'     :   '172.16.255.201',
              'tun_mode'    :   'gre ip',
              'peer_bgp_asn':   '65003'
            }],
            'border02.dcloud.cisco.com': [
            {
              'tun_ip'      :   '10.100.101.2 255.255.255.252',
              'peer_ip'     :   '10.100.101.1',
              'tun_dst'     :   '172.16.255.201',
              'tun_mode'    :   'gre ip',
              'peer_bgp_asn':   '65003'
            }]
        } %}
        {% endraw %}
      version: "1.0"

  # ============================================================================
  # FABRIC TEMPLATES
  # ============================================================================

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: true
      template_description: "VRF configuration for multi-tenancy with shared VRF support - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9500 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9300 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9400 Series Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: "1. FABRIC-VRF"
      project_name: EVPN-DMZ
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% include "EVPN-DMZ/DEFN-VRF" %}
        {% include "EVPN-DMZ/DEFN-ROLES" %}
        {% include "EVPN-DMZ/DEFN-LOOPBACKS" %}
        
        {# Resolve the VRF objects upfront #}
        {% set vrf_objs = [] %}
        {% for input_vrf in vrf_list %}
          {% set _vrf = (DEFN_VRF | selectattr("name", "equalto", input_vrf) | list | first) %}
          {% if _vrf %}{% do vrf_objs.append(_vrf | first) %}{% endif %}
        {% endfor %}
        
        {% for vrf in vrf_objs %}
        vrf definition {{ vrf.name }}
        description VRF {{ vrf.name }} definition
        rd {{ DEFN_LOOP_UNDERLAY[__device.hostname] }}:{{ vrf.id }}
        !
        address-family ipv4
        {% if vrf.name != 'shared' %}
        {% set shared_vrf = DEFN_VRF | selectattr("name", "equalto", "shared") | list | first %}
        route-target import {{ FABRIC_BGP_ASN }}:{{ shared_vrf.id }}
        route-target export {{ FABRIC_BGP_ASN }}:{{ vrf.id }}
        route-target import {{ FABRIC_BGP_ASN }}:{{ vrf.id }}
        route-target export {{ FABRIC_BGP_ASN }}:{{ vrf.id }} stitching
        route-target import {{ FABRIC_BGP_ASN }}:{{ vrf.id }} stitching
        {% else %}
          route-target export {{ FABRIC_BGP_ASN }}:{{ vrf.id }}
          {% for vrf in vrf_objs %}
          {% if vrf.name != 'shared' %}
          route-replicate from vrf {{ vrf.name }} unicast all
          route-target import {{ FABRIC_BGP_ASN }}:{{ vrf.id }}
          {% endif %}
          {% endfor %}
        {% endif %}
        exit-address-family
        !
        {% endfor %}
        {% endraw %}
      template_params:
        - parameter_name: vrf_list
          data_type: STRING
          default_value: null
          description: "List of VRF names to configure"
          required: true
          param_array: true
          selection:
            selection_type: MULTI_SELECT
            selection_values:
              "901": "red"
              "902": "blue"
              "903": "green"
              "1000": "shared"
        - parameter_name: __device
          data_type: STRING
          default_value: null
          description: "Device object"
          required: true
          param_array: false
        - parameter_name: FABRIC_BGP_ASN
          data_type: STRING
          default_value: "65003"
          description: "BGP AS number for the fabric"
          required: true
          param_array: false
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: true
      template_description: "Loopback interface configuration - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9500 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9300 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9400 Series Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: "2. FABRIC-LOOPBACKS"
      project_name: EVPN-DMZ
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% include "EVPN-DMZ/DEFN-VRF" %}
        {% include "EVPN-DMZ/DEFN-ROLES" %}
        {% include "EVPN-DMZ/DEFN-LOOPBACKS" %}
        {% include "EVPN-DMZ/DEFN-OVERLAY" %}
        
        {# Resolve the VRF objects upfront #}
        {% set vrf_objs = [] %}
        {% for input_vrf in vrf_list %}
          {% set _vrf = (DEFN_VRF | selectattr("name", "equalto", input_vrf) | list | first) %}
          {% if _vrf %}{% do vrf_objs.append(_vrf | first) %}{% endif %}
        {% endfor %}
        
        {# UNDERLAY LOOPBACKS #}
        interface {{DEFN_LOOP_NAME['UNDERLAY']}}
        description UNDERLAY-NVE-INTERFACE
        ip address {{DEFN_LOOP_UNDERLAY[__device.hostname]}} 255.255.255.255
        ip pim sparse-mode
        !
        {% if __device.hostname in DEFN_NODE_ROLES['SPINE']  %}
        {# SKIP SPINE #}
        {% endif %}
        
        {% if __device.hostname in DEFN_NODE_ROLES['BORDER'] %}
            interface {{DEFN_LOOP_NAME['IPSEC']}}
            description IPSEC TUNNEL SOURCE INTERFACE
            ip address {{DEFN_LOOP_IPSEC[__device.hostname]}} 255.255.255.255
            ip ospf {{FABRIC_UNDERLAY['instance_id']}} area {{FABRIC_UNDERLAY['area']}}
            !
            interface {{DEFN_LOOP_NAME['MCLUSTER']}}
            description NVE MULTICLUSTER INTERFACE
            ip address {{DEFN_LOOP_MCLUSTER[__device.hostname]}} 255.255.255.255
            !
        {% else  %}
            {% for input_vrf in vrf_objs %}
                {% set ip = DEFN_LOOP_UNDERLAY[__device.hostname] %}
                {% set split_ip = ip.split('\\.') %}
                {% set last_octet = split_ip[3] %}
                interface Loopback{{input_vrf.id}}
                description OVERLAY-VRF-{{input_vrf.name}}
                vrf forwarding {{input_vrf.name}}
                ip address {{DEFN_LOOP_OVERLAY[input_vrf.name]}}{{last_octet}} 255.255.255.255
                ip pim sparse-mode
                !
            {% endfor %}
        {% endif %}
        {% endraw %}
      template_params:
        - parameter_name: vrf_list
          data_type: STRING
          default_value: null
          description: "List of VRF names to configure"
          required: false
          param_array: true
          selection:
            selection_type: MULTI_SELECT
            selection_values:
              "901": "red"
              "902": "blue"
              "903": "green"
              "1000": "shared"
        - parameter_name: __device
          data_type: STRING
          default_value: null
          description: "Device object"
          required: true
          param_array: false
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: true
      template_description: "IPSec/GRE tunnel configuration for border connectivity - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9500 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9300 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9400 Series Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: "2.5 FABRIC-IPSEC"
      project_name: EVPN-DMZ
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% include "EVPN-DMZ/DEFN-ROLES" %}
        {% include "EVPN-DMZ/DEFN-LOOPBACKS" %}
        {% include "EVPN-DMZ/DEFN-OVERLAY" %}
        {% include "EVPN-DMZ/DEFN-IPSEC" %}
        
        
        {% if __device.hostname in DEFN_NODE_ROLES['BORDER']  %}
        router ospf {{FABRIC_IPSEC_UNDERLAY['instance_id']}}
        router-id {{DEFN_LOOP_IPSEC[__device.hostname]}}
        !
        {% set tun_index = (DEFN_LOOP_IPSEC[__device.hostname]).split('\\.')[3] | int %}
        {% set tun_list = DEFN_IPSEC[__device.hostname] %}
        {% for tun in tun_list %}
        interface Tunnel{{tun_index + loop.index0}}
        description TUNNEL TO DMZ HUB
        ip address {{tun['tun_ip']}}
        ip ospf {{FABRIC_IPSEC_UNDERLAY['instance_id']}} area {{FABRIC_IPSEC_UNDERLAY['area']}}
        carrier-delay msec 0
        tunnel source {{DEFN_LOOP_NAME['IPSEC']}}
        tunnel mode {{tun['tun_mode']}}
        tunnel destination {{tun['tun_dst']}}
        !
        {% endfor %}
        {% endif %}
        {% endraw %}
      template_params:
        - parameter_name: __device
          data_type: STRING
          default_value: null
          description: "Device object"
          required: true
          param_array: false
      version: "1.0"

  - configuration_templates:
      author: admin
      composite: false
      custom_params_order: true
      template_description: "Network Virtualization Edge (NVE) interface configuration - DMZ"
      device_types:
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9500 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9000 Series Virtual Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9300 Series Switches
        - product_family: Switches and Hubs
          product_series: Cisco Catalyst 9400 Series Switches
      failure_policy: ABORT_TARGET_ON_ERROR
      language: JINJA
      template_name: "3. FABRIC-NVE"
      project_name: EVPN-DMZ
      project_description: "BGP EVPN VXLAN Campus Fabric Templates - DMZ Border"
      software_type: IOS
      softwareVariant: XE
      software_version: null
      template_content: |
        {% raw %}
        {% include "EVPN-DMZ/DEFN-VRF" %}
        {% include "EVPN-DMZ/DEFN-ROLES" %}
        {% include "EVPN-DMZ/DEFN-LOOPBACKS" %}
        {% include "EVPN-DMZ/DEFN-VNIOFFSETS" %}
        
        {# Resolve the VRF objects upfront #}
        {% set vrf_objs = [] %}
        {% for input_vrf in vrf_list %}
          {% set _vrf = (DEFN_VRF | selectattr("name", "equalto", input_vrf) | list | first) %}
          {% if _vrf %}{% do vrf_objs.append(_vrf | first) %}{% endif %}
        {% endfor %}
        
        {# --- VLAN SECTION --- #}
        ! @start-ignore-compliance 
        {% for vrf in vrf_objs %}
        vlan {{ vrf.id }}
         name L3-VRF-CORE-{{ vrf.id }}
        !
        {% endfor %}
        ! @end-ignore-compliance
        
        {# --- VLAN CONFIGURATION SECTION --- #}
        {% for vrf in vrf_objs %}
        vlan configuration {{ vrf.id }}
         member vni {{ (L3VNIOFFSET|string) + vrf.id }}
        !
        {% endfor %}
        
        {# --- INTERFACE VLAN SECTION --- #}
        {% for vrf in vrf_objs %}
        interface Vlan{{ vrf.id }}
         description ** SVI for {{ vrf.name }} L3VNI **
         vrf forwarding {{ vrf.name }}
         ip unnumbered {{ DEFN_LOOP_NAME['UNDERLAY'] }}
         no ip redirects
         no ip unreachables
         no ip proxy-arp
         ip pim sparse-mode
         load-interval 30
         carrier-delay msec 0
         no autostate
         hold-queue 4094 in
         hold-queue 4094 out
         !
        {% endfor %}
        
        {# --- INTERFACE NVE1 SECTION --- #}
        interface nve1
         description ** NVE Interface for VXLAN **
         no ip address
         source-interface {{ DEFN_LOOP_NAME['UNDERLAY'] }}
         host-reachability protocol bgp
        {% for vrf in vrf_objs %}
         member vni {{ (L3VNIOFFSET|string) + vrf.id }} vrf {{ vrf.name }}
        {% endfor %}
        {% endraw %}
      template_params:
        - parameter_name: vrf_list
          data_type: STRING
          default_value: null
          description: "List of VRF names to configure"
          required: true
          param_array: true
          selection:
            selection_type: MULTI_SELECT
            selection_values:
              "901": "red"
              "902": "blue"
              "903": "green"
      version: "1.0"

